[build]
builder = "NIXPACKS"
NIXPACKS_PNPM_VERSION=10.33.2
buildCommand = "cd indexer && pnpm install --frozen-lockfile && INDEXER_DATABASE_URL='postgresql://placeholder:placeholder@localhost:5432/talambag?sslmode=disable' pnpm run db:generate && pnpm run build"

[deploy]
startCommand = "cd indexer && pnpm run db:migrate:deploy && pnpm run start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10