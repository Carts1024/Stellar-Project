name: CI And Testnet Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts

      - name: Run Soroban contract tests
        working-directory: contracts
        run: cargo test --workspace

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  indexer:
    name: Indexer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: indexer/pnpm-lock.yaml

      - name: Install indexer dependencies
        working-directory: indexer
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: indexer
        env:
          INDEXER_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/talambag?sslmode=disable
        run: pnpm run db:generate

      - name: Typecheck indexer
        working-directory: indexer
        run: pnpm run typecheck

      - name: Build indexer
        working-directory: indexer
        run: pnpm run build

  deploy-testnet:
    name: Deploy Testnet Contracts
    runs-on: ubuntu-latest
    needs:
      - contracts
      - frontend
      - indexer
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      STELLAR_TESTNET_ADMIN_ADDRESS: ${{ secrets.STELLAR_TESTNET_ADMIN_ADDRESS }}
      STELLAR_TESTNET_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts

      - name: Install system dependencies for Stellar CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked

      - name: Verify deployment secrets
        run: |
          test -n "$STELLAR_TESTNET_SECRET_KEY"
          test -n "$STELLAR_TESTNET_ADMIN_ADDRESS"

      - name: Build Talambag core contract
        working-directory: contracts
        run: stellar contract build

      - name: Build rewards contract
        working-directory: contracts/rewards
        run: stellar contract build

      - name: Deploy and link contracts
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          CORE_CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/target/wasm32v1-none/release/talambag.wasm \
            --source "$STELLAR_TESTNET_SECRET_KEY" \
            --network testnet \
            -- \
            --admin "$STELLAR_TESTNET_ADMIN_ADDRESS")

          REWARD_CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/rewards/target/wasm32v1-none/release/talambag_rewards.wasm \
            --source "$STELLAR_TESTNET_SECRET_KEY" \
            --network testnet \
            -- \
            --admin "$STELLAR_TESTNET_ADMIN_ADDRESS" \
            --name "Talambag Rewards" \
            --symbol "TLMBG" \
            --decimals 7)

          stellar contract invoke \
            --id "$CORE_CONTRACT_ID" \
            --source "$STELLAR_TESTNET_SECRET_KEY" \
            --network testnet \
            -- \
            set_rewards_contract \
            --admin "$STELLAR_TESTNET_ADMIN_ADDRESS" \
            --rewards_contract "$REWARD_CONTRACT_ID"

          stellar contract invoke \
            --id "$REWARD_CONTRACT_ID" \
            --source "$STELLAR_TESTNET_SECRET_KEY" \
            --network testnet \
            -- \
            set_core_contract \
            --admin "$STELLAR_TESTNET_ADMIN_ADDRESS" \
            --core_contract "$CORE_CONTRACT_ID"

          {
            echo "core_contract_id=$CORE_CONTRACT_ID"
            echo "reward_contract_id=$REWARD_CONTRACT_ID"
          } >> "$GITHUB_OUTPUT"

          cat <<EOF > deployment.env
          NEXT_PUBLIC_TALAMBAG_CONTRACT_ID=$CORE_CONTRACT_ID
          NEXT_PUBLIC_TALAMBAG_REWARDS_CONTRACT_ID=$REWARD_CONTRACT_ID
          EOF

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: talambag-testnet-contract-ids
          path: deployment.env

      - name: Summarize deployment
        run: |
          {
            echo "## Testnet Deployment"
            echo
            echo "Core contract: ${{ steps.deploy.outputs.core_contract_id }}"
            echo "Rewards contract: ${{ steps.deploy.outputs.reward_contract_id }}"
          } >> "$GITHUB_STEP_SUMMARY"